              - textbox "Write the candidate answer here..." [ref=e422]: I use the assistant for draft generation, boilerplate, test ideas, and alternative implementations, but I scope each prompt tightly. I include the exact interface, constraints, data shapes, non-functional requirements, and any edge cases I already know about so the model is working against the real problem instead of guessing. I do not trust the first answer. For code, I run the tests, add missing edge-case tests, and read the diff for logic errors, state bugs, and incorrect assumptions. For architecture or SQL, I cross-check the proposal against the requirements, failure modes, and performance constraints. If the model produces something suspicious, I ask it to explain the reasoning, compare alternatives, or point out assumptions, then I verify those claims myself. I treat AI output as a fast starting point, not authority. That lets me move faster on implementation while keeping correctness, security, and maintainability under human review.
