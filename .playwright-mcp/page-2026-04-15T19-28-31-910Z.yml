            - heading "Answer" [level=3] [ref=e101]
            - textbox "Write the candidate answer here..." [ref=e102]: "I would treat both the migration and the SQL as untrusted drafts until they pass targeted checks. The first step is giving the AI enough context up front: current schema, data volume, rollback requirements, performance expectations, and what the query is supposed to return. That reduces the chance of the model inventing columns, using the wrong join path, or choosing a migration pattern that is unsafe for our environment. For the migration, I would read it manually for destructive or locking operations, check whether it is backwards compatible, and confirm whether it can run safely against production-sized data. I would run it in a staging or disposable database cloned from realistic schema state, verify the resulting schema, and test the rollback path if one exists. If the migration adds indexes, constraints, or column rewrites, I would check how long those operations take and whether they cause unacceptable locks. For the SQL query, I would validate correctness and performance separately. Correctness means checking the joins, predicates, grouping, null handling, and edge cases against known sample data and expected outputs. Performance means using explain plans, checking index usage, and testing against realistic cardinalities so a query that looks fine on tiny data does not become dangerous in production. I would also compare the generated SQL to the original business requirement, not just whether it runs. AI-generated queries often look plausible while quietly changing semantics, for example by turning an outer join into an inner join, duplicating rows because of join multiplicity, or filtering too early. If I find issues, I would either correct them directly or reprompt with a tighter constraint and revalidate. So the workflow is: provide precise context, run the migration and query in a safe environment, inspect behavior and plans, test edge cases and rollback, and only ship once both the semantics and operational safety are clear."
