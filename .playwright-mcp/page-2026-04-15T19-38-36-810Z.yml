                    - generic [ref=e1155]: 15 Apr 2026, 21:33
                  - generic [ref=e1156]: "I would design the reporting layer around strict tenant isolation at every layer: identity, authorization, storage, query building, caching, and export generation. At the request boundary, every call should resolve to an authenticated user and an allowed tenant scope. The API should never trust a raw tenant id from the client by itself; it should derive tenant access from the user's role and claims. That tenant context then becomes mandatory in every downstream read and aggregation path. For storage, I would keep the transactional system as the source of truth and project reporting data into a read-optimized reporting store. Every fact and aggregate should be tagged with tenant id. For stronger protection, I would enforce tenant filters both in application code and in the database, for example with row-level security or equivalent policies, so accidental cross-tenant reads are blocked even if a query is written incorrectly. Heavy analytics should not run directly against the transactional schema on every dashboard request. I would use scheduled or event-driven aggregation jobs to populate tenant-scoped summary tables or materialized views keyed by tenant, date, role, recommendation, and similar dimensions. That keeps report reads fast and predictable. Caching and exports need the same discipline. Cache keys must include tenant id and filter shape. Export jobs should run with explicit tenant scoping and write results to tenant-scoped object paths with controlled access. Audit logs should record who ran the report and what tenant scope was used. The main tradeoff is shared versus physically isolated infrastructure. Shared infrastructure with strong logical isolation is cheaper and simpler to operate, while per-tenant schemas or databases reduce blast radius but increase cost and operational complexity. I would start with shared infrastructure plus strong authorization and DB-level protections, then offer stronger isolation only for customers with stricter security or scale requirements. So the design is: authenticated tenant context, database-enforced isolation, pre-aggregated tenant-scoped reporting tables, careful cache and export scoping, and monitoring for query latency and cross-tenant access violations."
