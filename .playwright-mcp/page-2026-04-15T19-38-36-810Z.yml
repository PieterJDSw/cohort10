                    - generic [ref=e1365]: text
                    - generic [ref=e1366]: 15 Apr 2026, 21:35
                  - generic [ref=e1367]: "The first step is to confirm the gap clearly and stop pretending the original date is still realistic. I would align with the team on the actual state of the work, what is blocked, and what the true remaining path looks like. Once that is clear, I would move quickly to options: can we recover the full commitment, reduce scope to hit the date safely, or reset the date with a credible plan. I would take ownership of making that information explicit rather than letting leadership or external stakeholders discover the miss indirectly. That means escalating early with a concise status: what was committed, why it is at risk, what confidence we have in the revised assessment, and what options exist. If scope reduction is possible, I would recommend the smallest externally acceptable slice we can ship with quality rather than forcing the team into a risky crunch. At the same time, I would coordinate tightly with engineering, product, and whoever owns external communication so the message is consistent. The communication should be direct and factual: what changed, what the new plan is, and what we are doing to reduce further surprises. I would avoid vague optimism because that only damages trust if we miss again. After the immediate plan is set, I would make sure the recovery path has clear owners, checkpoints, and risk tracking. Once the delivery issue is stabilized, I would run a retrospective on why the miss was not surfaced earlier and what planning or execution signals we ignored. The right approach is ownership, early escalation, realistic options, and a recovery plan people can believe."
