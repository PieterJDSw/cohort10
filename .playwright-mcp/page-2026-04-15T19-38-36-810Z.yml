                  - generic [ref=e757]: "I would separate this into a write path for producing searchable data and a read path optimized for low-latency filtering. The source of truth would still be the transactional database that stores assessments and final scores, but I would project the fields recruiters search on into a dedicated search store or indexed read model. On the write side, when an assessment is scored or updated, the system should emit an event or enqueue a sync job that updates the search index. The indexed document should include candidate id, role, overall score, recommendation, completed date, and any other fields needed for filtering or sorting. That keeps the search service independent from the heavier transactional schema and avoids expensive joins at query time. For the read path, I would use a search-oriented backend such as Elasticsearch or OpenSearch if flexibility and filtering volume justify it. If the query patterns are simpler and the dataset is moderate, a relational read replica with carefully chosen indexes could work, but for low-latency filtering across multiple dimensions and future free-text search, a search index is the safer design. The API layer would accept recruiter filters, translate them into the search query, and return paginated results plus facets if needed. To keep latency low, I would index exactly the fields needed for common filters and sorts, avoid loading heavyweight candidate detail in the first result page, and use pagination designed for stable ordering. For example, sort by completed_at or score and fetch detail lazily after the recruiter opens a specific result. I would also cache high-frequency filter combinations if usage patterns justify it. The main tradeoff is eventual consistency. If the search index is fed asynchronously, the search view may lag slightly behind the transactional system. That is usually acceptable for recruiter search, but I would make the lag visible operationally and provide replay or backfill tooling. Reliability also means the indexing pipeline must be idempotent, retryable, and easy to monitor, with dead-letter handling for malformed documents. From a maintainability standpoint, I would keep the indexing schema versioned and isolate search query building in one service rather than spreading search logic across the codebase. So the design is: transactional source of truth, projection into a search-optimized read model, thin search API, and strong monitoring around indexing freshness and query latency."
