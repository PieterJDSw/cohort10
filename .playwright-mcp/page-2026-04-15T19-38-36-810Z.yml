                  - generic [ref=e865]: I would add an index when a table has important queries that repeatedly filter, join, or sort on the same columns and those queries are slow enough that read performance matters. Common examples are looking up a user by email, joining on foreign keys, or filtering assessment results by score, recommendation, and completed date. Indexes help because they let the database avoid scanning the whole table for every query. But they are only worth it when they match real access patterns. I would usually make the decision based on slow-query evidence and execution plans rather than guessing. The tradeoffs are write cost, storage cost, and selectivity. Every index takes disk space and makes inserts, updates, and deletes more expensive because the index structure also has to be maintained. Too many indexes can also make schema changes and maintenance heavier. And an index is less useful if the column has very low selectivity, such as a boolean field where most rows have the same value. So the right approach is to look at real query patterns, confirm with explain plans, and choose indexes that match the filters and sort order that matter most. Indexes are great for speeding up the right reads, but over-indexing hurts writes and operational simplicity.
