              - textbox "Write the candidate answer here..." [ref=e422]: "I would split this into a small set of clear components around the main lifecycle: session creation, answer capture, evaluation, and reporting. At the front door I would have an API service that manages candidates, assessment sessions, question plans, answer submission, and result retrieval. It writes the core relational data to Postgres because the entities are structured and transactional: candidates, sessions, questions, submissions, evaluator runs, dimension scores, and final reports. The UI talks only to this API. For assessment content, I would keep a question bank with metadata, rubric definitions, and coding test fixtures. When a session starts, the service materializes a session-specific plan so the exact question order is auditable and stable. For evaluation, I would separate synchronous user actions from heavier scoring work. Saving an answer should be fast and durable: write the submission, return success, and optionally enqueue evaluation work. A worker process can then run deterministic code checks for coding questions, call the LLM-based evaluators, normalize the outputs, and persist evaluator runs. When the session is finished, a synthesis step aggregates dimension scores and produces the final report. That separation keeps the candidate experience responsive and makes retries operationally safer. For reliability, I would make submission writes idempotent, store raw evaluator output alongside normalized JSON, and treat the database as the source of truth. Background jobs should be retryable and safe to rerun, with per-question status so partial failures are visible. Timeouts or model failures should not lose the submission; they should produce an auditable failed evaluator run and allow reprocessing. For scalability, the API can scale horizontally behind a load balancer because session state is in Postgres. Worker capacity can scale independently based on evaluation backlog. If result browsing grows, I would add read replicas or a reporting index, but I would start simple because the write volume is probably modest in an MVP. For maintainability, I would keep the domain boundaries explicit: session management, submission ingestion, evaluation orchestration, and reporting. I would also expose an audit view so hiring teams can inspect evidence rather than only trusting a final score. The main tradeoff is complexity versus speed: a fully asynchronous architecture is more operationally involved than scoring inline, but it gives better responsiveness, retries, and room to grow once evaluation volume or model latency increases."
