            - heading "Answer" [level=3] [ref=e99]
            - textbox "Write the candidate answer here..." [ref=e100]: "I would review it in two layers: first make sure we protect the codebase, then make sure the teammate gets clear, actionable feedback. Since the PR already works, my first priority is identifying what is blocking merge versus what is cleanup we can reasonably defer. Shaky tests are usually the main risk, because if behavior changes later we lose confidence quickly, so I would call out the missing or weak coverage explicitly and ask for tests that prove the important paths and edge cases. For the structure issues, I would be specific rather than saying the code is messy. I would point to a few concrete refactors such as splitting a large function, improving naming, or isolating repeated logic. If the structural problems are severe enough to make future changes risky, I would ask for those before merge. If they are mostly polish, I would separate them into follow-up suggestions so we do not block unnecessarily. I would communicate the review in a collaborative way: explain the risk, explain why the change matters, and suggest the smallest next steps to get the PR over the line. If needed, I would offer to pair on the tests or help break the refactor into smaller steps. The goal is not just to reject weak work, but to help raise the quality while keeping momentum. So my approach is: protect correctness first with stronger tests, require cleanup that materially affects maintainability, defer lower-value polish when appropriate, and give feedback that is concrete, respectful, and easy to act on."
