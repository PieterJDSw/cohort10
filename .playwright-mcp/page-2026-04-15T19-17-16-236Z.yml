              - textbox "Write the candidate answer here..." [ref=e255]: "I would add an index when a query pattern is important enough that read performance matters and the database is repeatedly searching, filtering, joining, or sorting on the same columns. Typical cases are lookup columns like user_id or email, foreign keys used in joins, and high-traffic filters such as status plus created_at for dashboards or background jobs. The reason indexes help is that they let the database find matching rows more efficiently than scanning the whole table. But I would not add indexes blindly. They only help when the indexed columns are selective enough and the query pattern actually uses them. For example, indexing a low-cardinality column by itself, like a boolean flag with almost all rows sharing the same value, often gives little benefit. The tradeoff is that every index has a cost. It consumes storage, increases write overhead on inserts, updates, and deletes, and can make maintenance work like vacuuming, reindexing, or replication heavier. Too many indexes can also confuse tuning because you are paying write cost for indexes that queries rarely use. So my rule is: add indexes based on observed query patterns and execution plans, not guesswork. Look at slow queries, confirm the access path with explain plans, and choose indexes that match the actual filter, join, and sort conditions. Good indexing speeds up the right reads, but over-indexing hurts write performance and operational simplicity."
