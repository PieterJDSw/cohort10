              - textbox "Write the candidate answer here..." [ref=e422]: "Cache-aside means the application reads from the cache first and, on a miss, loads the value from the database and writes it into the cache. On writes, the application updates the source of truth and then invalidates or refreshes the cache entry. It is a good fit when the database is authoritative and reads dominate writes, because it keeps the cache simple and only stores hot data. The tradeoff is stale data risk and more application logic, especially around invalidation. Write-through means every write goes through the cache layer, and the cache synchronously writes to the backing store as part of the same operation. Reads are fast because the cache is always expected to be warm for recently written data. This is a good fit when you want simpler consistency semantics between cache and store and you can afford the extra write latency. The downside is slower writes and the possibility of filling the cache with data that is rarely read. Write-behind, or write-back, means the application writes to the cache first and the cache flushes changes to the database asynchronously later. That can improve write throughput and smooth bursts because the caller does not wait for durable storage on every write. It fits workloads where very high write volume matters and the system can tolerate eventual consistency. The tradeoff is operational risk: queued writes can be lost on failure without durable buffering, ordering matters, and reads from other systems may see stale data until the flush completes. So the core difference is where the application goes first and when the backing store is updated. Cache-aside optimizes read paths with app-managed loading, write-through favors consistency at the cost of write latency, and write-behind favors write performance at the cost of durability and consistency complexity."
