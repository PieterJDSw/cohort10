              - textbox "Write the candidate answer here..." [ref=e422]: I would put a provider gateway in front of the external LLM rather than letting product code call the vendor directly. That gateway owns authentication, request shaping, retries, rate-limit handling, observability, and model failover rules. Requests from the app would be classified by priority and latency sensitivity. Interactive user flows would go through a bounded synchronous path with strict timeouts and graceful degradation. Heavy or non-urgent work, such as batch scoring or document analysis, would be queued and processed asynchronously by workers. That prevents slow provider responses from tying up the request path. To handle rate limits, I would use a combination of token buckets and queues. Before sending traffic to the provider, the gateway checks available request and token budget. If capacity exists, it forwards immediately. If not, low-priority work is queued and retried later with backoff and jitter. For interactive flows, I would fail fast once the latency budget is exceeded and return a clear fallback state to the product instead of letting requests hang. Because the provider can be slow or flaky, I would make every request idempotent from our side, attach correlation IDs, and record raw request and response metadata for debugging. Retries should only happen for safe classes of failure, like transient network errors or explicit rate-limit responses. I would cap retries and surface final failure clearly so the system does not amplify vendor incidents. For reliability, I would persist queued work durably, track job state, and support dead-letter handling for repeated failures. If the vendor is degraded, workers can pause or shed low-priority traffic rather than continuously hammering the API. I would also maintain circuit breakers so a failing provider does not cascade timeouts through the rest of the system. For scalability and maintainability, the gateway gives us one place to add caching, prompt templates, usage accounting, and multi-provider routing later. The tradeoff is another operational component, but it is worth it because rate limits and unreliable latency are cross-cutting concerns that should not be reimplemented in every feature.
