services:
  postgres:
    image: postgres:16
    container_name: assessment_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: assessment_db
      POSTGRES_USER: assessment_user
      POSTGRES_PASSWORD: assessment_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assessment_user -d assessment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./mvp-assessment/backend
    container_name: assessment_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      vllm:
        condition: service_started
    environment:
      APP_NAME: MVP Assessment
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://assessment_user:assessment_pass@postgres:5432/assessment_db
      FRONTEND_ORIGIN: http://localhost:5173
      RUN_MIGRATIONS_ON_STARTUP: "true"
      SEED_QUESTIONS_ON_STARTUP: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-local-vllm}
      OPENAI_API_BASE: http://vllm:8000/v1
      MODEL_NAME: ${MODEL_NAME:-google/gemma-4-E2B-it}
      LLM_ENABLED: "true"
      LLM_TOOL_USE_ENABLED: "true"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      STRANDS_LOG_LEVEL: DEBUG
      RABBITMQ_ENABLED: "true"
      RABBITMQ_URL: amqp://assessment:assessment@rabbitmq:5672/%2f
      RABBITMQ_EXCHANGE: assessment.events
      RABBITMQ_DEAD_LETTER_EXCHANGE: assessment.events.dlx
      RABBITMQ_EVALUATE_QUEUE: evaluate
      RABBITMQ_SYNTHESIS_QUEUE: synthesis
      RABBITMQ_DEAD_LETTER_QUEUE: dead_letter
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    labels:
      com.assessment.service: backend

  agent-backend:
    build:
      context: ./mvp-assessment/agent-backend
    container_name: assessment_agent_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      vllm:
        condition: service_started
    environment:
      APP_NAME: MVP Assessment Agent Backend
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://assessment_user:assessment_pass@postgres:5432/assessment_db
      FRONTEND_ORIGIN: http://localhost:5173
      RUN_MIGRATIONS_ON_STARTUP: "false"
      SEED_QUESTIONS_ON_STARTUP: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-local-vllm}
      OPENAI_API_BASE: http://vllm:8000/v1
      MODEL_NAME: ${MODEL_NAME:-google/gemma-4-E2B-it}
      LLM_ENABLED: "true"
      LLM_TOOL_USE_ENABLED: "true"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      STRANDS_LOG_LEVEL: DEBUG
      RABBITMQ_ENABLED: "true"
      RABBITMQ_URL: amqp://assessment:assessment@rabbitmq:5672/%2f
      RABBITMQ_EXCHANGE: assessment.events
      RABBITMQ_DEAD_LETTER_EXCHANGE: assessment.events.dlx
      RABBITMQ_EVALUATE_QUEUE: evaluate
      RABBITMQ_SYNTHESIS_QUEUE: synthesis
      RABBITMQ_DEAD_LETTER_QUEUE: dead_letter
    ports:
      - "8002:8000"
    labels:
      com.assessment.service: agent-backend

  frontend:
    build:
      context: ./mvp-assessment/frontend
    container_name: assessment_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "5173:5173"
    labels:
      com.assessment.service: frontend

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: assessment_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: assessment
      RABBITMQ_DEFAULT_PASS: assessment
    ports:
      - "5672:5672"
      - "15672:15672"
    labels:
      com.assessment.service: rabbitmq
  vllm:
    image: vllm/vllm-openai:gemma4
    container_name: assessment_vllm
    restart: unless-stopped
    ports:
      - "8001:8000"
    ipc: host
    shm_size: "16gb"
    gpus: all
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    command: >
      --model google/gemma-4-E2B-it
      --host 0.0.0.0
      --port 8000
      --quantization bitsandbytes
      --enable-auto-tool-choice
      --tool-call-parser gemma4
      --reasoning-parser gemma4
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.83}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-8000}
      --language-model-only
      --skip-mm-profiling
      --enforce-eager
      --max-num-seqs 1
    labels:
      com.assessment.service: vllm

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: assessment_prometheus
    restart: unless-stopped
    depends_on:
      - backend
      - agent-backend
      - loki
      - alloy
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    labels:
      com.assessment.service: prometheus

  loki:
    image: grafana/loki:3.4.2
    container_name: assessment_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    labels:
      com.assessment.service: loki

  alloy:
    image: grafana/alloy:v1.8.3
    container_name: assessment_alloy
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    depends_on:
      - loki
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "12345:12345"
    labels:
      com.assessment.service: alloy

  grafana:
    image: grafana/grafana:11.2.0
    container_name: assessment_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_METRICS_ENABLED: "true"
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    labels:
      com.assessment.service: grafana
      
